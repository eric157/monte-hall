<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Monty Hall Visual Simulator Logo</title>
  <desc id="logoDesc">A stylized emblem with three doors and a golden prize spark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b7a75"/>
      <stop offset="100%" stop-color="#2a6fdb"/>
    </linearGradient>
    <linearGradient id="door" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6c18c"/>
      <stop offset="100%" stop-color="#d0803e"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4a4"/>
      <stop offset="100%" stop-color="#efb12f"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#0e314e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>

  <g filter="url(#soft)">
    <rect x="96" y="120" width="320" height="272" rx="38" fill="#fff7ea" opacity="0.94"/>
    <rect x="132" y="160" width="72" height="198" rx="14" fill="url(#door)"/>
    <rect x="220" y="160" width="72" height="198" rx="14" fill="url(#door)"/>
    <rect x="308" y="160" width="72" height="198" rx="14" fill="url(#door)"/>

    <circle cx="198" cy="260" r="5" fill="#a85e29"/>
    <circle cx="286" cy="260" r="5" fill="#a85e29"/>
    <circle cx="374" cy="260" r="5" fill="#a85e29"/>
  </g>

  <g transform="translate(338 96)">
    <path d="M32 0l10 24 24 10-24 10-10 24-10-24L-2 34l24-10z" fill="url(#spark)"/>
    <circle cx="32" cy="34" r="30" fill="none" stroke="#fff4bf" stroke-opacity="0.8" stroke-width="4"/>
  </g>

  <text x="256" y="436" text-anchor="middle" font-family="Space Grotesk, Trebuchet MS, sans-serif" font-weight="700" font-size="46" fill="#fff7e8">MONTY LAB</text>
</svg>
